<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: file:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' file: data:;">
  <title>DeskPet - 桌面宠物</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 主容器 -->
  <div id="app" class="app">
    <!-- 视频容器 -->
    <div id="video-container" class="video-container">
      <canvas id="chroma-canvas" class="chroma-canvas"></canvas>
      <video 
        id="pet-video" 
        class="pet-video"
        playsinline
        muted
        loop
        preload="auto"
      ></video>
    </div>
    
    <!-- 拖拽区域 -->
    <div id="drag-area" class="drag-area"></div>
    
    <!-- 控制按钮 -->
    <div id="controls" class="controls hidden">
      <button id="btn-switch" class="control-btn" title="切换动画">
        <span class="icon">🎬</span>
      </button>
      <button id="btn-settings" class="control-btn" title="设置">
        <span class="icon">⚙</span>
      </button>
    </div>
    
    <!-- 加载指示器 -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span class="loading-text">加载中...</span>
    </div>
  </div>
  
  <script src="../../node_modules/gsap/dist/gsap.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
