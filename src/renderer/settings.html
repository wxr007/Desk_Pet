<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>DeskPet 设置</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #2d2d2d;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 自定义标题栏 */
    .title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      -webkit-app-region: drag;
      user-select: none;
    }

    .title-bar h2 {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
    }

    .window-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .window-btn {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      position: relative;
    }

    .window-btn:hover {
      opacity: 0.8;
      transform: scale(1.1);
    }

    .btn-close {
      background: #ff5f56;
    }

    .btn-close::before,
    .btn-close::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 2px;
      background: rgba(0, 0, 0, 0.4);
      top: 50%;
      left: 50%;
      border-radius: 1px;
    }

    .btn-close::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .btn-close::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .settings-container {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
    }

    h3 {
      margin-bottom: 16px;
      font-size: 16px;
      font-weight: 600;
    }

    .settings-section {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-section:last-of-type {
      border-bottom: none;
    }

    .settings-section h4 {
      font-size: 14px;
      color: #b0b0b0;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 16px;
    }

    .setting-item label {
      font-size: 13px;
      color: #e0e0e0;
      flex-shrink: 0;
    }

    .setting-item input[type="text"],
    .setting-item select {
      flex: 1;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #ffffff;
      font-size: 13px;
      min-width: 0;
    }

    .setting-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .setting-item input[type="range"] {
      flex: 1;
      min-width: 0;
    }

    .setting-item input[type="color"] {
      width: 50px;
      height: 28px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .color-picker-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-eye-dropper {
      width: 28px;
      height: 28px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-eye-dropper:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .btn-eye-dropper:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 视频预览区域 */
    .video-preview-container {
      position: relative;
      width: 100%;
      height: 150px;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
      cursor: crosshair;
    }

    .video-preview {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .video-preview-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
    }

    .value-display {
      font-size: 12px;
      color: #888;
      min-width: 50px;
      text-align: right;
    }

    .input-group {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .input-group input {
      flex: 1;
    }

    button {
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #ffffff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .btn-primary {
      background: #4a90d9;
      border-color: #4a90d9;
    }

    .btn-primary:hover {
      background: #357abd;
      border-color: #357abd;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .settings-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      bottom: 0;
      background: #2d2d2d;
    }

    select option {
      background: #2d2d2d;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <!-- 自定义标题栏 -->
  <div class="title-bar">
    <h2>DeskPet 设置</h2>
    <div class="window-controls">
      <button class="window-btn btn-close" id="btn-close" title="关闭"></button>
    </div>
  </div>
  
  <div class="settings-container">
    <h3>设置</h3>
    
    <!-- 视频设置 -->
    <section class="settings-section">
      <h4>视频设置</h4>
      <div class="setting-item">
        <label>视频目录</label>
        <div class="input-group">
          <input type="text" id="video-folder" readonly>
          <button id="btn-select-folder">选择</button>
        </div>
      </div>
      <div class="setting-item">
        <label>当前视频</label>
        <select id="video-select"></select>
      </div>
      <div class="setting-item">
        <label>循环播放</label>
        <input type="checkbox" id="video-loop" checked>
      </div>
    </section>
    
    <!-- 绿幕设置 -->
    <section class="settings-section">
      <h4>绿幕设置</h4>
      
      <div class="setting-item">
        <label>启用绿幕</label>
        <input type="checkbox" id="chroma-enabled" checked>
      </div>
      <div class="setting-item">
        <label>抠图颜色</label>
        <div class="color-picker-group">
          <input type="color" id="chroma-color" value="#00ff00">
        </div>
      </div>
      <div class="setting-item">
        <label>相似度</label>
        <input type="range" id="chroma-similarity" min="0" max="1" step="0.01" value="0.4">
        <span class="value-display" id="similarity-value">0.4</span>
      </div>
      <div class="setting-item">
        <label>平滑度</label>
        <input type="range" id="chroma-smoothness" min="0" max="1" step="0.01" value="0.1">
        <span class="value-display" id="smoothness-value">0.1</span>
      </div>
    </section>
    
    <!-- 窗口设置 -->
    <section class="settings-section">
      <h4>窗口设置</h4>
      <div class="setting-item">
        <label>透明度</label>
        <input type="range" id="window-opacity" min="0.1" max="1" step="0.05" value="1">
        <span class="value-display" id="opacity-value">100%</span>
      </div>
      <div class="setting-item">
        <label>窗口缩放</label>
        <input type="range" id="window-scale" min="0.5" max="2" step="0.1" value="1">
        <span class="value-display" id="scale-value">100%</span>
      </div>
      <div class="setting-item">
        <label>置顶显示</label>
        <input type="checkbox" id="window-always-top" checked>
      </div>
      <div class="setting-item">
        <label>鼠标穿透</label>
        <input type="checkbox" id="window-click-through">
      </div>
    </section>
    
    <!-- 交互设置 -->
    <section class="settings-section">
      <h4>交互设置</h4>
      <div class="setting-item">
        <label>单击动作</label>
        <select id="click-action">
          <option value="switch">切换动画</option>
          <option value="play">播放/暂停</option>
          <option value="none">无</option>
        </select>
      </div>
      <div class="setting-item">
        <label>双击动作</label>
        <select id="dblclick-action">
          <option value="settings">打开设置</option>
          <option value="switch">切换动画</option>
          <option value="none">无</option>
        </select>
      </div>
    </section>
    
    <!-- 动画设置 -->
    <section class="settings-section">
      <h4>动画设置</h4>
      <div class="setting-item">
        <label>启用 GSAP 动画</label>
        <input type="checkbox" id="animation-enabled" checked>
      </div>
      <div class="setting-item">
        <label>闲置动画</label>
        <input type="checkbox" id="idle-animation" checked>
      </div>
    </section>
    
    <div class="settings-footer">
      <button id="btn-reset" class="btn-secondary">重置</button>
      <button id="btn-save" class="btn-primary">保存</button>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
